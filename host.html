<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ルーム管理</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="hostContainer">

    <h1>

        ルーム管理

    </h1>

    <div class="roomCreateArea">

        <input

            id="roomNameInput"

            type="text"

            placeholder="ルーム名"

        >

        <button id="createRoomButton">

            新しい部屋を作成

        </button>

    </div>

    <h2>

        保存済みルーム

    </h2>

    <div id="roomList">

    </div>

    <button

        id="homeButton"

        class="backButton"

    >

        ホームへ戻る

    </button>

</div>

<script src="js/config.js"></script>
<script src="js/room.js"></script>
<script src="js/host.js"></script>

</body>

</html>
