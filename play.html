<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Play</title>

<link
rel="stylesheet"
href="css/style.css">

</head>

<body>

<div id="game">

    <h1>
        Percent Balloon
    </h1>

    <div id="questionBox">

        <div id="questionTitle">
        </div>

        <div id="question">
        </div>

    </div>

    <div id="answerArea">

        <input
            id="answerInput"
            type="number"
            min="0"
            max="100"
        >

        <button id="submitButton">
            解答
        </button>

    </div>

    <div id="mainScreen">

        <div id="percentBar">

            <!-- バー -->
            <div id="colorBar">

                <div id="fillBar"></div>

            </div>

            <!-- 目盛り -->
            <div id="tickContainer"></div>

            <!-- マーカー -->
            <div id="markerLayer">

                <div
                    id="currentMarker"
                    class="currentMarker">
                </div>

                <div
                    id="answerMarker"
                    class="answerMarker">
                </div>

                <div
                    id="correctMarker"
                    class="correctMarker">
                </div>

            </div>

        </div>

    </div>

    <div id="resultArea">

        <div id="differenceText">
        </div>

        <div id="scoreText">
        </div>

    </div>

    <button id="nextButton" style="display:none;">
    次へ
</button>

    <button
        id="homeButton"
        class="backButton">

        ホームへ戻る

    </button>

</div>

<script src="js/config.js"></script>
<script src="js/room.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/animation.js"></script>
<script src="js/play.js"></script>

</body>

</html>
